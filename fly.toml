app = "photo-boom-andx"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  USE_LOCAL_MODELS = "false"
  USE_HF_FALLBACK = "true"
  PUBLIC_URL = "https://photo-boom-andx.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
