<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHOTO BOOM — ANDX NETWORK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800;900&family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root{--bg:#03070a;--bg2:#061015;--panel:#081317;--bio:#39ffd4;--bio2:#8effe6;--violet:#a06bff;--ink:#eafffa;--muted:#5e828c;--line:rgba(57,255,212,0.18);}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;}
  .stage{min-height:100vh;padding:36px 18px 48px;display:flex;flex-direction:column;align-items:center;gap:28px;background:radial-gradient(circle at 18% 8%,rgba(160,107,255,0.18),transparent 40%),radial-gradient(circle at 85% 15%,rgba(57,255,212,0.14),transparent 45%),var(--bg);}
  .header{text-align:center;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;color:var(--bio2);text-transform:uppercase;margin-bottom:10px;}
  .eyebrow::before{content:"◆ ";}
  h1{font-family:'Unbounded',sans-serif;font-weight:900;font-size:clamp(28px,6vw,44px);margin:0;background:linear-gradient(120deg,var(--ink) 30%,var(--bio2) 60%,var(--violet) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--muted);font-size:14px;margin-top:10px;max-width:440px;}
  .phone{width:390px;max-width:94vw;border-radius:42px;background:linear-gradient(160deg,#0c1a1d,#04090b);border:1px solid rgba(255,255,255,0.06);box-shadow:0 0 0 1px rgba(57,255,212,0.08),0 40px 80px -30px rgba(57,255,212,0.12);padding:14px;}
  .notch{width:90px;height:18px;background:#020405;border-radius:12px;margin:0 auto 10px;}
  .screen{background:var(--bg2);border-radius:30px;overflow:hidden;border:1px solid var(--line);}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--line);}
  .brand{display:flex;align-items:center;gap:8px;font-family:'Unbounded',sans-serif;font-weight:800;font-size:14px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--bio);box-shadow:0 0 10px 3px var(--bio);}
  .limit{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--bio2);border:1px solid var(--line);padding:3px 8px;border-radius:20px;}
  .demo-banner{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--violet);text-align:center;padding:8px 16px 0;letter-spacing:.08em;}
  .style-caption{font-family:'Manrope',sans-serif;font-size:11px;color:var(--muted);text-align:center;padding:0 16px 6px;}
  .style-caption strong{color:var(--bio2);font-weight:600;}
  /* Compare: base = ПОСЛЕ (full), overlay = ДО (left) */
  .compare-box{position:relative;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:3/4;max-height:240px;margin:10px 16px 8px;border:1px solid var(--line);}
  .compare-box img{width:100%;height:100%;object-fit:cover;display:block;}
  .compare-base{position:relative;width:100%;height:100%;}
  .compare-before{position:absolute;inset:0;clip-path:inset(0 calc(100% - 50%) 0 0);z-index:2;}
  .compare-slider{position:absolute;inset:0;z-index:4;opacity:0;cursor:ew-resize;width:100%;height:100%;margin:0;}
  .compare-handle{position:absolute;top:0;bottom:0;width:2px;background:var(--bio);box-shadow:0 0 14px var(--bio);left:50%;z-index:3;pointer-events:none;}
  .compare-handle::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;background:rgba(3,7,10,0.75);border:2px solid var(--bio);box-shadow:0 0 12px rgba(57,255,212,0.5);}
  .compare-labels{position:absolute;inset:0;pointer-events:none;z-index:3;display:flex;justify-content:space-between;align-items:flex-end;padding:10px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.12em;}
  .compare-labels span{padding:3px 7px;border-radius:4px;background:rgba(0,0,0,0.55);}
  .compare-labels .lbl-before{color:var(--ink);}
  .compare-labels .lbl-after{color:var(--bio2);}
  .uploadzone{margin:0 16px 12px;border-radius:18px;border:1px dashed rgba(57,255,212,0.35);background:rgba(57,255,212,0.03);padding:14px;text-align:center;position:relative;cursor:pointer;}
  .uploadzone input{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;}
  .uploadzone .scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--bio),transparent);animation:scan 2.6s linear infinite;display:none;z-index:1;}
  .uploadzone.busy .scanline{display:block;}
  @keyframes scan{0%{top:8%}50%{top:88%}100%{top:8%}}
  .uploadzone .label{font-size:12.5px;font-weight:600;}
  .uploadzone .hint{font-size:11px;color:var(--muted);margin-top:4px;}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;padding:0 16px;margin:8px 0 10px;}
  .deck{display:flex;gap:10px;padding:0 16px 12px;overflow-x:auto;scroll-snap-type:x mandatory;}
  .deck::-webkit-scrollbar{display:none;}
  .card{flex:0 0 118px;scroll-snap-align:start;border-radius:14px;background:var(--panel);border:1px solid var(--line);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;}
  .card:hover{transform:translateY(-2px);}
  .card .img{width:100%;height:136px;overflow:hidden;background:#0a1c20;position:relative;}
  .card .img img{width:100%;height:100%;object-fit:cover;}
  .card .img .badge{position:absolute;top:6px;left:6px;font-family:'JetBrains Mono',monospace;font-size:8px;background:rgba(0,0,0,0.65);color:var(--bio2);padding:2px 5px;border-radius:4px;letter-spacing:.06em;}
  .card .tag{padding:7px 8px 9px;}
  .card .tag .num{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--bio2);}
  .card .tag .name{font-size:10.5px;font-weight:700;margin-top:2px;line-height:1.2;}
  .card .tag .hint{font-size:9px;color:var(--muted);margin-top:2px;}
  .card.active{border-color:var(--bio);box-shadow:0 0 0 1px var(--bio),0 0 20px -4px rgba(57,255,212,0.45);}
  .card.done .tag .num{color:var(--violet);}
  .cta{margin:8px 16px 16px;background:linear-gradient(120deg,var(--bio),var(--bio2),var(--violet));color:#02201c;font-family:'Unbounded',sans-serif;font-weight:800;font-size:12px;padding:13px 0;border-radius:14px;cursor:pointer;border:none;width:calc(100% - 32px);}
  .cta:disabled{opacity:.4;cursor:not-allowed;}
  .error{color:#ff5fc4;font-size:11px;margin:0 16px 8px;text-align:center;min-height:14px;}
  .specs{width:390px;max-width:94vw;display:flex;flex-direction:column;gap:8px;}
  .spec-row{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:8px 2px;font-size:12px;}
  .spec-row .k{font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:10.5px;}
  .spec-row .v{color:var(--bio2);font-weight:600;}
</style>
</head>
<body>
<div class="stage">
  <div class="header">
    <div class="eyebrow">ANDX NETWORK</div>
    <h1>PHOTO BOOM</h1>
    <div class="sub">5 стилей · 5 разных образов · сравнение ДО и ПОСЛЕ</div>
  </div>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <div class="topbar">
        <div class="brand"><span class="dot"></span>Photo Boom</div>
        <div class="limit" id="limitBadge">0 / 5</div>
      </div>
      <div class="demo-banner" id="demoBanner">◆ ПРИМЕРЫ ОБРАБОТКИ</div>
      <div class="style-caption" id="styleCaption"><strong>Upgrade</strong> · Studio portrait</div>
      <div class="compare-box" id="compareBox">
        <div class="compare-base">
          <img id="compareAfter" alt="После обработки">
        </div>
        <div class="compare-before" id="compareBeforeWrap">
          <img id="compareOriginal" alt="До обработки">
        </div>
        <div class="compare-handle" id="compareHandle"></div>
        <input type="range" class="compare-slider" id="compareSlider" min="0" max="100" value="50">
        <div class="compare-labels">
          <span class="lbl-before">ДО</span>
          <span class="lbl-after">ПОСЛЕ</span>
        </div>
      </div>
      <label class="uploadzone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*">
        <div class="scanline"></div>
        <div class="label" id="uploadLabel">Загрузить своё фото</div>
        <div class="hint" id="uploadHint">предпросмотр на вашем снимке</div>
      </label>
      <div class="error" id="errorMsg"></div>
      <div class="section-label">Выберите стиль</div>
      <div class="deck" id="deck"></div>
      <button class="cta" id="processBtn">ЗАГРУЗИТЕ ФОТО ДЛЯ ОБРАБОТКИ</button>
    </div>
  </div>
  <div class="specs">
    <div class="spec-row"><span class="k">FACE RESTORE</span><span class="v" id="specModel">CodeFormer · MPS</span></div>
    <div class="spec-row"><span class="k">DEMO</span><span class="v">5 портретов · 5 стилей</span></div>
  </div>
</div>
<script>
const STYLES=[
  {id:'upgrade',num:'01',name:'Upgrade'},
  {id:'quiet_luxury',num:'02',name:'Quiet Luxury'},
  {id:'cinematic_twilight',num:'03',name:'Cinematic Twilight'},
  {id:'bw_noir',num:'04',name:'B&W Noir'},
  {id:'magazine_cover',num:'05',name:'Magazine Cover'},
];
let sessionId=null, selectedFile=null, activeStyle='upgrade';
let previews={}, originals={}, labels={}, results={};

function setSlider(v){
  document.getElementById('compareBeforeWrap').style.clipPath=`inset(0 calc(100% - ${v}%) 0 0)`;
  document.getElementById('compareHandle').style.left=v+'%';
  document.getElementById('compareSlider').value=v;
}

async function initSession(){
  try{
    const r=await fetch('/session',{method:'POST'});
    const d=await r.json();
    sessionId=d.session_id;
    document.getElementById('limitBadge').textContent=`0 / ${d.limit}`;
  }catch(e){document.getElementById('errorMsg').textContent='Запустите сервер: uvicorn app:app --reload';}
}

function buildDeck(){
  document.getElementById('deck').innerHTML=STYLES.map(s=>`
    <div class="card${s.id===activeStyle?' active':''}${results[s.id]?' done':''}" data-style="${s.id}">
      <div class="img">
        <span class="badge">${s.num}</span>
        <img src="${previews[s.id]||''}" alt="${s.name}">
      </div>
      <div class="tag">
        <div class="num">${s.num}</div>
        <div class="name">${s.name}</div>
        <div class="hint">${labels[s.id]||''}</div>
      </div>
    </div>`).join('');
  document.querySelectorAll('.card').forEach(c=>{
    c.onclick=()=>{
      activeStyle=c.dataset.style;
      document.querySelectorAll('.card').forEach(x=>x.classList.remove('active'));
      c.classList.add('active');
      updateCompare();
      updateBtn();
    };
  });
}

function updateCompare(){
  const before=originals[activeStyle];
  const after=previews[activeStyle];
  if(!before||!after) return;
  document.getElementById('compareOriginal').src=before;
  document.getElementById('compareAfter').src=after;
  const st=STYLES.find(s=>s.id===activeStyle);
  document.getElementById('styleCaption').innerHTML=
    `<strong>${st.name}</strong>${labels[activeStyle]?` · ${labels[activeStyle]}`:''}`;
  setSlider(document.getElementById('compareSlider').value||50);
}

function updateBtn(){
  const btn=document.getElementById('processBtn');
  if(!selectedFile){btn.textContent='ЗАГРУЗИТЕ ФОТО ДЛЯ ОБРАБОТКИ';btn.disabled=true;return;}
  btn.disabled=false;
  btn.textContent=results[activeStyle]?'СКАЧАТЬ РЕЗУЛЬТАТ':`ОБРАБОТАТЬ «${STYLES.find(s=>s.id===activeStyle).name.toUpperCase()}»`;
}

async function loadDemos(){
  try{
    const r=await fetch('/demo/samples');
    if(!r.ok) throw new Error('no api');
    const d=await r.json();
    d.previews.forEach(p=>{
      previews[p.style]=p.thumbnail;
      originals[p.style]=p.original||p.thumbnail;
      if(p.label) labels[p.style]=p.label;
    });
  }catch(e){
    STYLES.forEach(s=>{
      previews[s.id]=`/static/demo/${s.id}.jpg?t=2`;
      originals[s.id]=`/static/demo/original_${s.id}.jpg?t=2`;
    });
  }
  buildDeck();
  updateCompare();
}

document.getElementById('compareSlider').oninput=e=>setSlider(e.target.value);

document.getElementById('fileInput').onchange=async e=>{
  const file=e.target.files[0];
  if(!file) return;
  selectedFile=file; results={};
  document.getElementById('demoBanner').textContent='◆ ВАШЕ ФОТО';
  document.getElementById('uploadLabel').textContent=file.name;
  document.getElementById('uploadHint').textContent='Генерируем предпросмотр…';
  document.getElementById('uploadZone').classList.add('busy');
  const blobUrl=URL.createObjectURL(file);

  const form=new FormData();
  form.append('file',file);
  try{
    const r=await fetch('/preview/all',{method:'POST',body:form});
    const data=await r.json();
    if(!r.ok) throw new Error(data.detail?.message||data.detail||'Ошибка');
    previews={}; originals={}; labels={};
    data.previews.forEach(p=>{
      previews[p.style]=p.thumbnail;
      originals[p.style]=blobUrl;
    });
    document.getElementById('uploadHint').textContent='Выберите стиль → обработка';
    buildDeck(); updateCompare(); updateBtn();
  }catch(err){
    document.getElementById('errorMsg').textContent=err.message;
  }finally{
    document.getElementById('uploadZone').classList.remove('busy');
  }
};

document.getElementById('processBtn').onclick=async()=>{
  if(results[activeStyle]){window.open(`/download/${sessionId}/${activeStyle}`,'_blank');return;}
  if(!selectedFile||!sessionId) return;
  const btn=document.getElementById('processBtn');
  btn.disabled=true;
  document.getElementById('uploadZone').classList.add('busy');
  const form=new FormData();
  form.append('session_id',sessionId);
  form.append('style',activeStyle);
  form.append('file',selectedFile);
  try{
    const r=await fetch('/process',{method:'POST',body:form});
    const data=await r.json();
    if(!r.ok) throw new Error(data.detail?.message||data.detail||'Ошибка');
    results[data.style]=data.download_url;
    previews[data.style]=data.download_url+'?t='+Date.now();
    document.querySelector(`[data-style="${data.style}"]`)?.classList.add('done');
    document.getElementById('limitBadge').textContent=`${5-data.remaining} / 5`;
    updateCompare(); updateBtn();
    document.getElementById('specModel').textContent=data.face_model+' · local';
  }catch(err){
    document.getElementById('errorMsg').textContent=err.message;
  }finally{
    btn.disabled=false;
    document.getElementById('uploadZone').classList.remove('busy');
    updateBtn();
  }
};

initSession();
loadDemos();
setSlider(50);
</script>
</body>
</html>
